# RSCDAgent Step Configuration
# Defines input, output, and execution conditions for each step

[step1]
name=paper_parse
script=parse_paper.py
input=paper
output=step1_paper_parse.json
required_inputs=[paper]

[step2]
name=repo_parse
script=inspect_repo.py
input=github_url
output=step2_repo_parse.json
required_inputs=[github_url, repo_path]

[step3]
name=dataset_check
script=check_dataset.py
input=dataset
output=step3_dataset_check.json
required_inputs=[dataset]
depends_on=[step1]

[step4]
name=plan_generate
script=generate_plan.py
input=plan
output=step4_plan.json
required_inputs=[step1, step2, step3]
depends_on=[step1, step2, step3]

[step5]
name=execution
script=run_repro.py
input=execution
output=step5_execution.json
required_inputs=[step4_plan]
depends_on=[step4]

[step6]
name=evaluation
script=evaluate_repro.py
input=evaluation
output=step6_evaluation.json
required_inputs=[step5, target]
depends_on=[step5]